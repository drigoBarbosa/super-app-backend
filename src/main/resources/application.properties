spring.application.name=superapp

## Configuracoes H2Database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=superuser
spring.datasource.password=123456


## Configuracoes hibernate
spring.jpa.hibernate.ddl-auto=validate

## Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

## Logs
logging.level.root=info
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){cyan} %clr(%5p){highlight} %clr([%thread]){blue} %clr(%logger{36}){green} - %msg%n